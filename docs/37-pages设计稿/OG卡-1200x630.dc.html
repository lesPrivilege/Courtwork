<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<title>Courtwork · OG 卡 1200×630</title>
<style>
  html,body{margin:0;padding:0;background:#EDEDED}
  body{font-family:-apple-system,'Segoe UI','PingFang SC','MiSans','Microsoft YaHei','Noto Sans SC','Helvetica Neue',Arial,sans-serif;color:#0A2540;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
  a{color:#2563EB;text-decoration:none} a:hover{color:#1D4ED8}
</style>
</helmet>

<div data-screen-label="OG 卡 1200×630" style="width:1200px;height:630px;background:#FAFAFA;position:relative;overflow:hidden;display:flex">

  <!-- 左：法理之线母题（图标几何的页面级放大） -->
  <div aria-hidden="true" style="flex:none;width:380px;position:relative">
    <!-- 竖线：上下比文书行各长出一截（icon.md 同构） -->
    <div style="position:absolute;left:120px;top:130px;bottom:130px;width:36px;border-radius:8px;background:#0A2540"></div>
    <!-- 三行文书行，第三行更短：文书是活的、未写完的 -->
    <div style="position:absolute;left:188px;top:172px;width:120px;height:34px;border-radius:10px;background:#9DB0C4"></div>
    <div style="position:absolute;left:188px;top:238px;width:120px;height:34px;border-radius:10px;background:#9DB0C4"></div>
    <div style="position:absolute;left:188px;top:304px;width:82px;height:34px;border-radius:10px;background:#9DB0C4"></div>
  </div>

  <!-- 分隔 hairline -->
  <div aria-hidden="true" style="flex:none;width:1px;background:#EBEBEB;margin:64px 0"></div>

  <!-- 右：wordmark + 定位句 -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 96px 0 72px">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="assets/icon-dark.svg" alt="" width="34" height="34" style="display:block;border-radius:8px" />
      <span style="font-size:28px;font-weight:510;letter-spacing:-0.01em">Courtwork</span>
    </div>
    <h1 style="margin:36px 0 0;font-size:54px;line-height:1.25;font-weight:510;letter-spacing:-0.01em">模型只生成，<br />不裁决。</h1>
    <p style="margin:24px 0 0;font-size:22px;line-height:1.55;color:#425466">律所与法务团队的案件级 AI 协作工作台</p>
    <p style="margin:40px 0 0;font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;font-size:16px;color:#6E8098">macOS · 原件只读 · 案件内容永不训练</p>
  </div>

  <!-- 底缘 hairline 收边 -->
  <div aria-hidden="true" style="position:absolute;left:0;right:0;bottom:0;height:1px;background:#EBEBEB"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 630 }
}"></script>
</body>
</html>
