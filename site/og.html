<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Courtwork OG</title>
  <style>
    @font-face { font-family: "Courtwork Manuscript Latin"; src: url(assets/fonts/manuscript-latin-subset.woff2) format("woff2"); font-weight: 400; font-display: swap; unicode-range: U+0043, U+006B, U+006F, U+0072, U+0074, U+0075, U+0077; }
    /* VERSIONAL-LANG-2：OG 卡跟随站面浅宗，变量按 token 名绑定。 */
    :root { --bg-app: #F7F8FA; --bg-surface: #F2F4F7; --text-primary: #232B38; --text-secondary: #55617A; --text-tertiary: #637083; --border-hairline: #D5DAE3; }
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body { display: grid; grid-template-columns: 410px 1fr; color: var(--text-primary); background: var(--bg-app); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-variant-numeric: tabular-nums; }
    /* 品牌记号单源消费（P1 回炉）：原先此处用 i + 3×span 手写 CSS 复刻母题，
       等于在 og 卡里另立一份几何真源——master 一改就悄悄脱钩。改为直接消费同一枚
       assets/icon.svg，几何只此一份。 */
    .mark { display: grid; place-items: center; border-right: 1px solid var(--border-hairline); background: var(--bg-surface); }
    .mark-art { width: 232px; height: 232px; }
    .copy { display: flex; flex-direction: column; justify-content: center; padding: 0 82px; }
    .wordmark { display: flex; align-items: center; gap: 13px; font-family: "Courtwork Manuscript Latin"; font-size: 29px; font-weight: 400; font-variation-settings: "wght" 400, "wdth" 100, "ENLA" 0; font-synthesis: none; letter-spacing: .025em; }
    .wordmark img { width: 28px; height: 28px; }
    h1 { margin: 36px 0 0; font-size: 58px; line-height: 1.18; font-weight: 510; letter-spacing: -.02em; }
    p { margin: 22px 0 0; color: var(--text-secondary); font-size: 21px; }
    small { margin-top: 42px; color: var(--text-tertiary); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 15px; }
  </style>
</head>
<body>
  <div class="mark" aria-hidden="true"><img class="mark-art" src="assets/icon.svg" alt=""></div>
  <div class="copy"><div class="wordmark"><img src="assets/icon.svg" alt="">Courtwork</div><h1>模型只生成，<br>不裁决。</h1><p>面向律所与法务团队的案件级 AI 工作台</p><small>macOS · 原件只读 · 合成数据试点 · 开发构建未公证</small></div>
</body>
</html>
